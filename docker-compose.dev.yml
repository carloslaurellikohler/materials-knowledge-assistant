# Override de desenvolvimento (hot reload + portas publicadas no host).
# Uso: docker compose -f docker-compose.yml -f docker-compose.dev.yml up --build
#
# As portas só são publicadas aqui (não no arquivo base), para que o ambiente de
# produção possa restringir o bind a 127.0.0.1 sem conflito de merge de listas.
services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app

  worker:
    volumes:
      - ./backend:/app

  qdrant:
    ports:
      - "6333:6333"

  redis:
    ports:
      - "6379:6379"

  postgres:
    ports:
      - "5432:5432"

  frontend:
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
