services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app

  worker:
    volumes:
      - ./backend:/app

  postgres:
    ports:
      - "5432:5432"

  frontend:
    command: npm run dev -- --hostname 0.0.0.0 --port 3000
    environment:
      - WATCHPACK_POLLING=true
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

volumes:
  frontend_node_modules:
