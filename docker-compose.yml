services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    working_dir: /app
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - CLERK_JWKS_URL=${CLERK_JWKS_URL:-}
      - CLERK_JWT_SECRET=${CLERK_JWT_SECRET:-dev-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
    depends_on:
      - qdrant
      - redis

  worker:
    build: ./backend
    working_dir: /app
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
    depends_on:
      - qdrant
      - redis

  frontend:
    build: ./frontend
    working_dir: /app
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1
      - NEXT_PUBLIC_ENABLE_CLERK=false
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

volumes:
  qdrant_data:
