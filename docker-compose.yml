services:
  qdrant:
    image: qdrant/qdrant:v1.11.3
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=mka
      - POSTGRES_USER=mka
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-mka-dev-password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mka -d mka"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://mka:${POSTGRES_PASSWORD:-mka-dev-password}@postgres:5432/mka
      - CLERK_JWKS_URL=${CLERK_JWKS_URL:-}
      - CLERK_JWT_SECRET=${CLERK_JWT_SECRET:-dev-secret}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-mka-documents}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000}
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  worker:
    build: ./backend
    working_dir: /app
    restart: unless-stopped
    command: celery -A app.workers.celery_app.celery_app worker --loglevel=INFO
    environment:
      - QDRANT_URL=http://qdrant:6333
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://mka:${POSTGRES_PASSWORD:-mka-dev-password}@postgres:5432/mka
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - COHERE_API_KEY=${COHERE_API_KEY:-}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
      - SUPABASE_BUCKET=${SUPABASE_BUCKET:-mka-documents}
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    working_dir: /app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_ENABLE_CLERK=${NEXT_PUBLIC_ENABLE_CLERK:-false}
      - NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY=${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-}
      - CLERK_SECRET_KEY=${CLERK_SECRET_KEY:-}
      - NEXT_TELEMETRY_DISABLED=1
    depends_on:
      - backend

volumes:
  qdrant_data:
  postgres_data:
